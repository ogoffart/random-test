name: Contribution agreement

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  contribution_agreement:
    runs-on: ubuntu-latest
    steps:
      - name: Check whether the author is a team member
        id: team
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          # Team members don't need the welcome or the agreement check:
          # a commit authored from a @slint.dev address, or membership in the
          # organization that owns the repository, counts as a team member.
          # TEMPORARILY DISABLED FOR TESTING: treat everyone as a non-team member.
          # ORG="${REPO%%/*}"
          # if gh api "/repos/$REPO/pulls/$PR/commits" --jq '.[].commit.author.email' | grep -qiE '@slint\.dev$' \
          #    || gh api "/orgs/$ORG/members/$AUTHOR" >/dev/null 2>&1; then
          #   echo "team=true" >> "$GITHUB_OUTPUT"
          # else
          #   echo "team=false" >> "$GITHUB_OUTPUT"
          # fi
          echo "team=false" >> "$GITHUB_OUTPUT"

      - name: Welcome first-time contributors
        if: >
          steps.team.outputs.team == 'false' &&
          github.event.action == 'opened' &&
          (github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR' ||
           github.event.pull_request.author_association == 'FIRST_TIMER')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR" --repo "$REPO" --body-file - <<'EOF'
          👋 Welcome, and thank you for your first contribution!

          Reviews can take a while — if you don't hear back, nudge us in our [public chat](https://chat.slint.dev).

          📄 By opening this PR you license your contribution under the [MIT No Attribution license (MIT-0)](https://opensource.org/license/mit-0): you wrote it yourself, and no third party (such as your employer) holds rights to it. To confirm, tick the contribution agreement box in the description above — the check below stays red until you do.
          EOF

      - name: Verify contribution agreement
        if: steps.team.outputs.team == 'false'
        env:
          BODY: ${{ github.event.pull_request.body }}
        run: |
          if printf '%s' "$BODY" | grep -qiE '^[[:space:]]*-?[[:space:]]*\[[xX]\][[:space:]]*I license my contribution'; then
            echo "Contribution agreement confirmed."
          else
            echo "::error::Tick the contribution agreement checkbox in the pull request description to confirm you license your contribution under MIT-0."
            exit 1
          fi
