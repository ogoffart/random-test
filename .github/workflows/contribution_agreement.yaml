name: Contribution agreement

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  contribution_agreement:
    runs-on: ubuntu-latest
    steps:
      - name: Check whether the author is a team member
        id: team
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          # Team members don't need the welcome or the agreement check:
          # a commit authored from a @slint.dev address, or membership in the
          # organization that owns the repository, counts as a team member.
          # TEMPORARILY DISABLED FOR TESTING: treat everyone as a non-team member.
          # ORG="${REPO%%/*}"
          # if gh api "/repos/$REPO/pulls/$PR/commits" --jq '.[].commit.author.email' | grep -qiE '@slint\.dev$' \
          #    || gh api "/orgs/$ORG/members/$AUTHOR" >/dev/null 2>&1; then
          #   echo "team=true" >> "$GITHUB_OUTPUT"
          # else
          #   echo "team=false" >> "$GITHUB_OUTPUT"
          # fi
          echo "team=false" >> "$GITHUB_OUTPUT"

      - name: Add the agreement checkbox to the description
        if: steps.team.outputs.team == 'false' && github.event.action == 'opened'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          BODY: ${{ github.event.pull_request.body }}
        run: |
          # Make sure the checkbox is present even if the PR template was removed.
          if printf '%s' "$BODY" | grep -qiE '\[[ xX]\][[:space:]]*I license my contribution'; then
            echo "Checkbox already present in the description."
          else
            checkbox="- [ ] I license my contribution under the [MIT No Attribution license (MIT-0)](https://opensource.org/license/mit-0). I wrote it myself, and no third party (such as my employer) holds rights to it. If you can't agree, leave this unchecked and tell us instead."
            printf '%s\n\n## Contribution agreement\n\n%s\n' "$BODY" "$checkbox" \
              | gh pr edit "$PR" --repo "$REPO" --body-file -
          fi

      - name: Ask the contributor to sign
        if: steps.team.outputs.team == 'false' && github.event.action == 'opened'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR" --repo "$REPO" --body-file - <<'EOF'
          👋 Thanks for the PR!

          Before we can merge it, please tick the **contribution agreement** checkbox in the description above to confirm you license your contribution under the [MIT No Attribution license (MIT-0)](https://opensource.org/license/mit-0). The check below stays red until you do.

          Reviews can take a while — if you don't hear back, nudge us in our [public chat](https://chat.slint.dev).
          EOF

      - name: Verify contribution agreement
        if: steps.team.outputs.team == 'false'
        env:
          BODY: ${{ github.event.pull_request.body }}
        run: |
          if printf '%s' "$BODY" | grep -qiE '^[[:space:]]*-?[[:space:]]*\[[xX]\][[:space:]]*I license my contribution'; then
            echo "Contribution agreement confirmed."
          else
            echo "::error::Tick the contribution agreement checkbox in the pull request description to confirm you license your contribution under MIT-0."
            exit 1
          fi
