name: Auto-triage on Comment

on:
  issue_comment:
    types: [created]

jobs:
  update_labels:
    runs-on: ubuntu-latest
    steps:
      - name: Check if issue has "needs info" label and commenter is external
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if issue has "needs info" label
          has_needs_info=$(echo '${{ toJson(github.event.issue.labels.*.name) }}' | jq 'contains(["needs info"])')
          
          # Check if commenter is org member
          is_member=$(gh api \
            -H "Accept: application/vnd.github+json" \
            /orgs/${{ github.repository_owner }}/members/${{ github.event.comment.user.login }} \
            --silent && echo "true" || echo "false")
          
          echo "has_needs_info=$has_needs_info" >> $GITHUB_OUTPUT
          echo "is_member=$is_member" >> $GITHUB_OUTPUT
          
      - name: Update labels
        if: steps.check.outputs.has_needs_info == 'true' 
        # && steps.check.outputs.is_member == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Remove "needs info" label
          gh api \
            --method DELETE \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/labels/needs%20info
          
          # Add "needs triage" label
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/labels \
            -f labels[]='Need triage'
